version: '3.8'

# ──────────────────────────────────────────────────────────────
# FastCast – EC2 Production Stack
# Services: postgres, redis, kafka, zookeeper, app
# (Grafana/Prometheus optional – uncomment if you want them)
# ──────────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fastcast-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastcast
      POSTGRES_USER: fastcast
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastcast"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fastcast-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fastcast-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fastcast-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true

  # ─────────────────────────────────────────
  # FASTCAST SPRING BOOT APP
  # ─────────────────────────────────────────
  app:
    build: .
    image: fastcast-backend:latest
    container_name: fastcast-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # DB
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fastcast
      SPRING_DATASOURCE_USERNAME: fastcast
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # Kafka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # AWS
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      # FFmpeg output dir (Linux path inside container)
      FFMPEG_OUTPUT_DIR: /fastcast-temp
      # JWT
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - hls_temp:/fastcast-temp

  # ─────────────────────────────────────────
  # OPTIONAL: Prometheus + Grafana
  # Uncomment for monitoring during demo
  # ─────────────────────────────────────────
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: fastcast-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: fastcast-grafana
  #   depends_on:
  #     - prometheus
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin123
  #   volumes:
  #     - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  redis_data:
  hls_temp:
  # grafana_data:
