spring:
  application:
    name: fastcast-backend

    kafka:
      bootstrap-servers: localhost:9092
      listener:
        missing-topics-fatal: false
    consumer:
      properties:
        reconnect.backoff.ms: 5000
        reconnect.backoff.max.ms: 30000


  # ?????????????????????????????????????????
  # DATABASE ? PostgreSQL
  # ?????????????????????????????????????????
  datasource:
    url: jdbc:postgresql://localhost:5432/fastcast
    username: fastcast
    password: fastcast123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # ?????????????????????????????????????????
  # JPA / HIBERNATE
  # ?????????????????????????????????????????
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ?????????????????????????????????????????
  # FLYWAY ? DB Migrations
  # ?????????????????????????????????????????
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ?????????????????????????????????????????
  # REDIS
  # ?????????????????????????????????????????
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ?????????????????????????????????????????
  # KAFKA
  # ?????????????????????????????????????????
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all                   # wait for all replicas ? no message loss
      retries: 3
    consumer:
      group-id: fastcast-processing-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.fastcast.*"

  # ?????????????????????????????????????????
  # FILE UPLOAD
  # ?????????????????????????????????????????
  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB

# ?????????????????????????????????????????
# SERVER
# ?????????????????????????????????????????
server:
  port: 8080
  servlet:
    context-path: /

# ?????????????????????????????????????????
# AWS S3
# ?????????????????????????????????????????
aws:
  region: ap-south-1
#  access-key: ${AWS_ACCESS_KEY}
#  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: fastcast-vedios
    presigned-url-expiry: 60      # minutes

# ?????????????????????????????????????????
# FFMPEG
# ?????????????????????????????????????????
ffmpeg:
  path: ffmpeg
  ffprobe-path: ffprobe
  output-dir: C:/fastcast-temp       # local temp dir for HLS chunks

# ?????????????????????????????????????????
# FASTCAST CUSTOM PROPERTIES
# ?????????????????????????????????????????
fastcast:
  cache:
    video-ttl: 3600               # seconds ? 1 hour
    chunk-ttl: 86400              # seconds ? 24 hours
  hls:
    segment-duration: 6           # seconds per .ts segment
    qualities:
      - resolution: 1280x720
        bitrate: 2800k
        name: 720p
      - resolution: 854x480
        bitrate: 1400k
        name: 480p
      - resolution: 426x240
        bitrate: 400k
        name: 240p

# ?????????????????????????????????????????
# ACTUATOR & MONITORING
# ?????????????????????????????????????????
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,caches
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ?????????????????????????????????????????
# SPRINGDOC / SWAGGER
# ?????????????????????????????????????????
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true


# ?????????????????????????????????????????
# LOGGING
# ?????????????????????????????????????????
logging:
  level:
    com.fastcast: DEBUG
    org.hibernate.SQL: DEBUG
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000  # 24 hours in ms


